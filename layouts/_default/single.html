{{ define "main" }}
<div class="post-layout">
  <main class="post-content">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </main>

  {{ if .TableOfContents }}
  <aside class="post-toc">
    <details class="toc-details" open>
      <summary>Content</summary>
      {{ .TableOfContents }}
    </details>
  </aside>
  {{ end }}
</div>
{{ end }}
